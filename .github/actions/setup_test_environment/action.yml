name: "Setup test environment"

description: Setup ROCm test environment from built artifacts

inputs:
  VENV_DIR:
    description: (string) Directory in which to create a Python virtual environment (e.g. `github.workspace/.venv`)
    required: true
  OUTPUT_ARTIFACTS_DIR:
    description: (string) Directory to download/unpack test artifacts into (e.g. `github.workspace/build`)
    required: true
  ARTIFACT_GROUP:
    description: (string) Artifact group (e.g. `gfx110X-all`)
    required: true
  AMDGPU_TARGETS:
    description: (string) Comma-separated individual GPU targets for fetching split artifacts (e.g. `gfx942`)
    default: ""
  ARTIFACT_RUN_ID:
    description: (string) Run ID to download artifacts from (`env.ARTIFACT_RUN_ID` or a value like `19716407405`)
    required: true
  ARTIFACT_RUN_GITHUB_REPO:
    description: (string) GitHub repository for artifact run in 'owner/repo' format
    default: "ROCm/TheRock"
  FETCH_ARTIFACT_ARGS:
    description: (string) Extra arguments to install_rocm_from_artifacts.py (e.g. `--blas --tests`)
  RELEASE_TYPE:
    description: 'Release type: "" for CI, or "dev", "nightly", "prerelease".'
    default: ""
  STEP_TIMEOUT_MINUTES:
    description: (string) Timeout in minutes for this step
    default: ""

runs:
  using: "composite"
  steps:
    # EXPERIMENTAL: Skip setup-python on Windows to test if it's causing GPU access issue
    # Investigation shows Python subprocess works on Windows outside GHA but fails inside GHA
    # Hypothesis: setup-python action may be setting up Python in a way that blocks GPU access
    - name: "Setting up Python"
      if: runner.os != 'Windows'
      uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
      env:
        RETRY_THIS_STEP: "true"
      with:
        python-version: 3.12

    - name: "Verify Python availability (Windows uses system Python)"
      if: runner.os == 'Windows'
      shell: bash
      run: |
        echo "Python version: $(python --version)"
        echo "Python path: $(which python)"
  
    - name: "Install UV (Windows)"
      if: runner.os == 'Windows'
      shell: pwsh
      run: irm https://astral.sh/uv/install.ps1 | iex

    - name: "Install UV (Linux/macOS)"
      if: runner.os != 'Windows'
      shell: bash
      run: curl -LsSf https://astral.sh/uv/install.sh | sh

    - name: Create Python venv
      shell: bash
      env:
        VENV_DIR: ${{ inputs.VENV_DIR }}
      run: |
        python build_tools/setup_venv.py ${VENV_DIR} \
          --activate-in-future-github-actions-steps \
          --use-uv

    - name: Install test requirements
      shell: bash
      run: |
        uv pip install -r requirements-test.txt
        uv pip freeze

    - name: Install Choco tools
      if: ${{ runner.os == 'Windows' }}
      shell: bash
      run: |
        choco install --no-progress -y ninja

    - name: Download and Unpack Artifacts
      shell: bash
      env:
        OUTPUT_ARTIFACTS_DIR: ${{ inputs.OUTPUT_ARTIFACTS_DIR }}
        ARTIFACT_GROUP: ${{ inputs.ARTIFACT_GROUP }}
        AMDGPU_TARGETS: ${{ inputs.AMDGPU_TARGETS }}
        ARTIFACT_RUN_ID: ${{ inputs.ARTIFACT_RUN_ID }}
        ARTIFACT_RUN_GITHUB_REPO: ${{ inputs.ARTIFACT_RUN_GITHUB_REPO }}
        FETCH_ARTIFACT_ARGS: ${{ inputs.FETCH_ARTIFACT_ARGS }}
        RELEASE_TYPE: ${{ inputs.RELEASE_TYPE }}
        GITHUB_TOKEN: ${{ github.token }}
        RETRY_THIS_STEP: "true"
        STEP_NAME: "${{ env.STEP_NAME_PREFIX }} - Download and Unpack Artifacts"
        STEP_TIMEOUT_TOLERANCE: "2"
      run: |
        python ./build_tools/install_rocm_from_artifacts.py \
          --run-id=${ARTIFACT_RUN_ID} \
          --run-github-repo=${ARTIFACT_RUN_GITHUB_REPO} \
          --artifact-group=${ARTIFACT_GROUP} \
          --amdgpu-targets=${AMDGPU_TARGETS} \
          --output-dir=${OUTPUT_ARTIFACTS_DIR} \
          ${FETCH_ARTIFACT_ARGS}